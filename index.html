<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;text-align:center}
.header{background:#000;padding:15px;border-bottom:1px solid #222}
.logo{font-size:1.8rem;color:#ff1a1a}
.hero{padding:30px}
.hero h1{text-shadow:0 0 15px red}
.trust{font-size:0.9rem;opacity:0.8;margin-bottom:10px}
.video{padding:10px}
.video video{width:90%;border-radius:10px}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:15px}
.card{background:#111;border-radius:10px;overflow:hidden;box-shadow:0 0 10px rgba(255,0,0,0.3)}
.card img{width:100%;height:140px;object-fit:cover}
.price{color:#ff4444;font-weight:bold}
button{background:#25D366;color:#fff;border:none;padding:10px;width:100%;font-weight:bold}
</style>
</head>

<body>

<div class="header"><div class="logo">🔥 DIABLITO</div></div>

<div class="hero">
<h1>Premium Smoke Experience</h1>
<p>Order instantly via WhatsApp</p>
<div class="trust">🚚 Same Day Delivery • 🔒 Discreet • ⭐ Trusted in Tijuana</div>
</div>

<!-- VIDEO -->
<div class="video">
<video controls>
<source src="https://diablito-smoke-shop.github.io/GrowHub.mp4" type="video/mp4">
</video>
</div>

<div id="products" class="products"></div>

<script>
const PHONE="521XXXXXXXXXX";

const products=[
{name:"Premium Strain 🔥",price:200,img:"https://diablito-smoke-shop.github.io/strain1.jpg"},
{name:"Exotic Strain 💨",price:250,img:"https://diablito-smoke-shop.github.io/strain2.jpg"},
{name:"All Strains Pack",price:600,img:"https://diablito-smoke-shop.github.io/allstrains.jpg"},
{name:"Special Mix 🌿",price:300,img:"https://diablito-smoke-shop.github.io/strain1.jpg"}
];

const el=document.getElementById('products');

products.forEach(p=>{
el.innerHTML+=`
<div class='card'>
<img src="\${p.img}">
<h3>\${p.name}</h3>
<div class="price">$ \${p.price}</div>
<button onclick="order('\${p.name}',\${p.price})">Order on WhatsApp</button>
</div>`;
});

function order(name,price){
const msg=encodeURIComponent("🔥 DIABLITO ORDER%0AProduct: "+name+"%0APrice: $"+price);
window.open("https://wa.me/"+PHONE+"?text="+msg);
}
</script>

</body>
</html>
