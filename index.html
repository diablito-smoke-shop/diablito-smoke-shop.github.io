<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;text-align:center}
.header{background:#000;padding:15px;border-bottom:1px solid #222}
.logo{font-size:1.8rem;color:#ff1a1a}
.hero{padding:30px}
.hero h1{text-shadow:0 0 15px red}
.trust{font-size:0.9rem;opacity:0.8;margin-bottom:10px}
.video{padding:10px}
.video video{width:90%;border-radius:10px}

.promo{background:#ff1a1a;padding:10px;font-weight:bold;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
padding:15px
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(255,0,0,0.3);
padding-bottom:10px;
}

.card img{width:100%;height:140px;object-fit:cover}

.thumb-container{
display:flex;
justify-content:center;
gap:5px;
margin-top:5px;
}

.thumb-container img{
width:30%;
height:50px;
object-fit:cover;
cursor:pointer;
border-radius:5px;
opacity:0.7;
}

.thumb-container img:hover{opacity:1;}

select,input{
width:90%;
margin:5px 0;
padding:6px;
}

input{display:none;}

button{
background:#25D366;
color:#fff;
border:none;
padding:10px;
width:90%;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.item-total{
font-size:1.1rem;
font-weight:bold;
margin-top:5px;
color:#00ff99;
transition:0.2s;
}

.glow{
color:#00ff99;
text-shadow:0 0 10px #00ff99;
}

.cart{
background:#000;
padding:20px;
border-top:2px solid #ff1a1a;
margin-top:20px;
}

.cart-total{
font-size:2rem;
color:#00ff99;
margin:10px 0;
}

.cart-item{
border-bottom:1px solid #222;
padding:5px;
}

.remove{
color:red;
cursor:pointer;
margin-left:10px;
}
</style>
</head>

<body>

<div class="header"><div class="logo">🔥 DIABLITO</div></div>

<div class="hero">
<h1>Premium Smoke Experience</h1>
<p>Order instantly via WhatsApp</p>
<div class="trust">🚚 Same Day Delivery • 🔒 Discreet • ⭐ Trusted in Tijuana</div>
</div>

<div class="promo">🔥 BUY MORE = BETTER DEALS 🔥</div>

<div class="video">
<video controls>
<source src="GrowHub.mp4" type="video/mp4">
</video>
</div>

<div class="products"></div>

<div class="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<div class="cart-total">$<span id="cartTotal">0.00</span></div>
<button onclick="sendOrder()">Order on WhatsApp</button>
</div>

<script>
/* 🔥 LIVE RATE SYSTEM */
let exchangeRate = 17;
const pricePerEighthMXN = 800;

async function fetchRate(){
try{
const res = await fetch("https://api.exchangerate-api.com/v4/latest/MXN");
const data = await res.json();
exchangeRate = data.rates.USD;
updateTotals();
}catch(e){
console.log("rate fallback");
}
}
setInterval(fetchRate,60000);
fetchRate();

/* 🔥 PRICE FUNCTION */
function getPrice(size){
return (pricePerEighthMXN * (size / 0.125)) * exchangeRate;
}

let cart = {};

const products = [
{name:"Premium Strain 🔥",img:"strain1.jpg"},
{name:"Exotic Strain 💨",img:"strain2.jpg"},
{name:"Top Shelf Strain 🌿",img:"strain3.jpg"}
];

function toggleCustomQty(selectId,inputId){
const s=document.getElementById(selectId);
const i=document.getElementById(inputId);
i.style.display=(s.value==="custom")?"block":"none";
updateTotals();
}

function getQty(q,c){
const qs=document.getElementById(q).value;
const cv=document.getElementById(c).value;
return (qs==="custom"&&cv)?parseInt(cv):parseInt(qs);
}

function sizeLabel(s){
if(s==0.125)return "1/8 oz";
if(s==0.5)return "1/2 oz";
if(s==1)return "1 oz";
if(s==16)return "1 lb";
return s+" oz";
}

function updateTotals(){
for(let i=1;i<=3;i++){
const size=parseFloat(document.getElementById("size"+i).value);
const qty=getQty("qty"+i,"custom"+i)||0;
const total=getPrice(size)*qty;

const el=document.getElementById("total"+i);
el.innerText="$"+total.toFixed(2);

if(total>0){el.classList.add("glow");}
else{el.classList.remove("glow");}
}
}

function addToCart(index){
const size=parseFloat(document.getElementById("size"+index).value);
const qty=getQty("qty"+index,"custom"+index);
if(!qty||qty<=0)return;

cart[index]={
name:products[index-1].name,
size:sizeLabel(size),
qty:qty,
total:getPrice(size)*qty
};

updateCart();
}

function removeItem(index){
delete cart[index];
updateCart();
}

function updateCart(){
let sum=0;
let html="";

for(let i in cart){
let item=cart[i];
sum+=item.total;

html+=`
<div class="cart-item">
${item.name}<br>
${item.size} x ${item.qty} - $${item.total.toFixed(2)}
<span class="remove" onclick="removeItem(${i})">❌</span>
</div>`;
}

document.getElementById("cartItems").innerHTML=html;
document.getElementById("cartTotal").innerText=sum.toFixed(2);
}

function sendOrder(){
if(Object.keys(cart).length===0)return;

let msg="DIABLITO\n\nOrder Request\n\n";
let grand=0;

for(let i in cart){
let item=cart[i];
grand+=item.total;

msg+=item.name+"\n";
msg+="Size: "+item.size+"\n";
msg+="Quantity: "+item.qty+"\n";
msg+="Item Total: $"+item.total.toFixed(2)+"\n\n";
}

msg+="Grand Total: $"+grand.toFixed(2);

window.open("https://wa.me/526635130363?text="+encodeURIComponent(msg));
}

/* BUILD PRODUCTS */
const container=document.querySelector(".products");

products.forEach((p,i)=>{
let id=i+1;

container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>

<select id="size${id}">
<option value="0.125">1/8 oz</option>
<option value="0.5">1/2 oz</option>
<option value="1">1 oz</option>
<option value="16">1 lb</option>
</select>

<select id="qty${id}" onchange="toggleCustomQty('qty${id}','custom${id}')">
<option value="0">Qty: 0</option>
<option value="1">Qty: 1</option>
<option value="2">Qty: 2</option>
<option value="3">Qty: 3</option>
<option value="4">Qty: 4</option>
<option value="5">Qty: 5</option>
<option value="custom">More...</option>
</select>

<input type="number" id="custom${id}" placeholder="Enter quantity">

<div id="total${id}" class="item-total">$0.00</div>

<button onclick="addToCart(${id})">Add to Cart</button>
</div>`;
});

document.querySelectorAll("select,input").forEach(el=>{
el.addEventListener("change",updateTotals);
el.addEventListener("input",updateTotals);
});
</script>

</body>
</html>
