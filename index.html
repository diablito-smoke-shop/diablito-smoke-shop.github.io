<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;text-align:center}
.header{background:#000;padding:15px;border-bottom:1px solid #222}
.logo{font-size:1.8rem;color:#ff1a1a}
.hero{padding:30px}
.hero h1{text-shadow:0 0 15px red}
.trust{font-size:0.9rem;opacity:0.8;margin-bottom:10px}
.video{padding:10px}
.video video{width:90%;border-radius:10px}
.promo{background:#ff1a1a;padding:10px;font-weight:bold;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
padding:15px
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(255,0,0,0.3);
padding-bottom:10px;
}

.card img{width:100%;height:140px;object-fit:cover}

select,input{
width:90%;
margin:5px 0;
padding:6px;
}

input{display:none;}

.total{color:#25D366;font-weight:bold;}

.cart{
position:fixed;
bottom:0;
width:100%;
background:#000;
padding:10px;
border-top:1px solid #222;
}

button{
background:#25D366;
color:#fff;
border:none;
padding:10px;
width:90%;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header"><div class="logo">🔥 DIABLITO</div></div>

<div class="hero">
<h1>Premium Smoke Experience</h1>
<p>Order instantly via WhatsApp</p>
<div class="trust">🚚 Same Day Delivery • 🔒 Discreet • ⭐ Trusted in Tijuana</div>
</div>

<div class="promo">🔥 BUY MORE = BETTER DEALS 🔥</div>

<div class="video">
<video controls>
<source src="GrowHub.mp4" type="video/mp4">
</video>
</div>

<div class="products">

<!-- PRODUCT -->
<div class="card">
<img src="strain1.jpg">
<h3>Premium Strain 🔥</h3>

<select id="size1">
<option value="0.125">1/8 oz</option>
<option value="0.5">1/2 oz</option>
<option value="1">1 oz</option>
<option value="16">1 lb</option>
</select>

<select id="qty1" onchange="toggleCustomQty('qty1','custom1')">
<option value="1">Qty: 1</option>
<option value="2">Qty: 2</option>
<option value="3">Qty: 3</option>
<option value="4">Qty: 4</option>
<option value="5">Qty: 5</option>
<option value="custom">More...</option>
</select>

<input type="number" id="custom1" placeholder="Enter quantity">

<div class="total" id="itemTotal1">$0.00</div>

<button onclick="addToCart('Premium Strain','size1','qty1','custom1',1)">
Add to Cart
</button>
</div>

<!-- COPY SAME STRUCTURE FOR OTHER PRODUCTS -->
<!-- (same as yours, just change IDs 2,3,4) -->

</div>

<div class="cart">
<div id="grandTotal">Total: $0.00</div>
<button onclick="checkout()">Order on WhatsApp</button>
</div>

<script>
const pricePerOz = 376.47;
let cart = [];

function toggleCustomQty(selectId, inputId){
const select = document.getElementById(selectId);
const input = document.getElementById(inputId);
input.style.display = (select.value === "custom") ? "block" : "none";
}

function getDiscount(qty){
if(qty >= 10) return 0.20;
if(qty >= 5) return 0.10;
return 0;
}

function sizeLabel(size){
if(size == 0.125) return "1/8 oz";
if(size == 0.5) return "1/2 oz";
if(size == 1) return "1 oz";
if(size == 16) return "1 lb";
return size + " oz";
}

function getQty(qtyId, customId){
const q = document.getElementById(qtyId).value;
const c = document.getElementById(customId).value;
return (q==="custom" && c) ? parseInt(c) : parseInt(q);
}

function addToCart(product, sizeId, qtyId, customId, id){
const size = parseFloat(document.getElementById(sizeId).value);
const qty = getQty(qtyId, customId);
const discount = getDiscount(qty);
const total = (pricePerOz * size * qty) * (1 - discount);

cart.push({
product,
size:sizeLabel(size),
qty,
total
});

document.getElementById("itemTotal"+id).innerText = "$"+total.toFixed(2);

updateCart();
}

function updateCart(){
let grand = 0;
cart.forEach(i => grand += i.total);
document.getElementById("grandTotal").innerText = "Total: $" + grand.toFixed(2);
}

function checkout(){
let msg = "DIABLITO\n\nOrder Request\n\n";

cart.forEach(i=>{
msg += i.product + "\n";
msg += "Size: " + i.size + "\n";
msg += "Quantity: " + i.qty + "\n";
msg += "Item Total: $" + i.total.toFixed(2) + "\n\n";
});

let grand = 0;
cart.forEach(i => grand += i.total);

msg += "Grand Total: $" + grand.toFixed(2) + "\n";
msg += "Please confirm availability and total.\n\n";

window.open("https://wa.me/526635130363?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
