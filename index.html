<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;text-align:center}
.header{background:#000;padding:15px;border-bottom:1px solid #222}
.logo{font-size:1.8rem;color:#ff1a1a}
.hero{padding:30px}
.hero h1{text-shadow:0 0 15px red}
.trust{font-size:0.9rem;opacity:0.8;margin-bottom:10px}
.video{padding:10px}
.video video{width:90%;border-radius:10px}

.promo{
background:#ff1a1a;
padding:10px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
padding:15px
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(255,0,0,0.3);
padding-bottom:10px;
}

.card img{
width:100%;
height:140px;
object-fit:cover
}

.price{color:#ff4444;font-weight:bold}

select{
width:90%;
margin:5px 0;
padding:5px;
}

button{
background:#25D366;
color:#fff;
border:none;
padding:10px;
width:90%;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header"><div class="logo">🔥 DIABLITO</div></div>

<div class="hero">
<h1>Premium Smoke Experience</h1>
<p>Order instantly via WhatsApp</p>
<div class="trust">🚚 Same Day Delivery • 🔒 Discreet • ⭐ Trusted in Tijuana</div>
</div>

<!-- DAILY PROMO -->
<div class="promo">
🔥 TODAY ONLY: Buy 2 8ths GET DISCOUNT 🔥
</div>

<div class="video">
<video controls>
<source src="GrowHub.mp4" type="video/mp4">
</video>
</div>

<div class="products">

<!-- PRODUCT 1 -->
<div class="card">
<img src="strain1.jpg">
<h3>Premium Strain 🔥</h3>

<select id="q1">
<option value="1/8 oz">1/8 oz</option>
<option value="2 x 1/8 oz">2 x 1/8 oz</option>
<option value="1/2 oz">1/2 oz</option>
<option value="1 oz">1 oz</option>
<option value="2 oz">2 oz</option>
</select>

<button onclick="order('Premium Strain', 'q1')">
Order on WhatsApp
</button>
</div>

<!-- PRODUCT 2 -->
<div class="card">
<img src="strain2.jpg">
<h3>Exotic Strain 💨</h3>

<select id="q2">
<option value="1/8 oz">1/8 oz</option>
<option value="2 x 1/8 oz">2 x 1/8 oz</option>
<option value="1/2 oz">1/2 oz</option>
<option value="1 oz">1 oz</option>
<option value="2 oz">2 oz</option>
</select>

<button onclick="order('Exotic Strain', 'q2')">
Order on WhatsApp
</button>
</div>

<!-- PRODUCT 3 -->
<div class="card">
<img src="strain3.jpg">
<h3>Top Shelf Strain 🌿</h3>

<select id="q3">
<option value="1/8 oz">1/8 oz</option>
<option value="2 x 1/8 oz">2 x 1/8 oz</option>
<option value="1/2 oz">1/2 oz</option>
<option value="1 oz">1 oz</option>
<option value="2 oz">2 oz</option>
</select>

<button onclick="order('Top Shelf Strain', 'q3')">
Order on WhatsApp
</button>
</div>

<!-- PRODUCT 4 -->
<div class="card">
<img src="allstrains.jpg">
<h3>All Strains Pack</h3>

<select id="q4">
<option value="1/8 oz">1/8 oz</option>
<option value="2 x 1/8 oz">2 x 1/8 oz</option>
<option value="1/2 oz">1/2 oz</option>
<option value="1 oz">1 oz</option>
<option value="2 oz">2 oz</option>
</select>

<button onclick="order('All Strains Pack', 'q4')">
Order on WhatsApp
</button>
</div>

</div>

<script>
function order(product, id){
const qty=document.getElementById(id).value;
const msg=encodeURIComponent("🔥 DIABLITO ORDER%0AProduct: "+product+"%0AQuantity: "+qty);
window.open("https://wa.me/526635130363?text="+msg);
}
</script>

</body>
</html>
