<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;text-align:center}
.header{background:#000;padding:15px;border-bottom:1px solid #222}
.logo{font-size:1.8rem;color:#ff1a1a}
.hero{padding:30px}
.hero h1{text-shadow:0 0 15px red}
.trust{font-size:0.9rem;opacity:0.8;margin-bottom:10px}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
padding:15px
}

.card{
background:#111;
border-radius:10px;
box-shadow:0 0 10px rgba(255,0,0,0.3);
padding-bottom:10px;
}

.card img{width:100%;height:140px;object-fit:cover}

select,input{
width:90%;
margin:5px 0;
padding:6px;
}

input{display:none;}

.price{color:#25D366;font-weight:bold;}
.savings{color:#ffcc00;font-size:0.9rem;}
.upsell{color:#00ccff;font-size:0.8rem;}

button{
background:#25D366;
color:#fff;
border:none;
padding:10px;
width:90%;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header"><div class="logo">🔥 DIABLITO</div></div>

<div class="hero">
<h1>Premium Smoke Experience</h1>
<p>Order instantly via WhatsApp</p>
<div class="trust">Same Day Delivery • Discreet • Trusted</div>
</div>

<div class="products">

<div class="card">
<img src="strain1.jpg">
<h3>Premium Strain 🔥</h3>

<select id="size1" onchange="updateTotal(1)">
<option value="0.125">1/8 oz</option>
<option value="0.5">1/2 oz</option>
<option value="1">1 oz</option>
<option value="16">1 lb ⭐ Best Value</option>
</select>

<select id="qty1" onchange="toggleCustomQty('qty1','custom1'); updateTotal(1)">
<option value="1">Qty: 1</option>
<option value="2">Qty: 2</option>
<option value="3">Qty: 3</option>
<option value="4">Qty: 4</option>
<option value="5">Qty: 5</option>
<option value="custom">More...</option>
</select>

<input type="number" id="custom1" placeholder="Enter quantity" oninput="updateTotal(1)">

<input type="text" id="coupon1" placeholder="Coupon Code (optional)" style="display:block;" oninput="updateTotal(1)">

<div class="price" id="total1">$0.00</div>
<div class="savings" id="save1"></div>
<div class="upsell" id="upsell1"></div>

<button onclick="order('Premium Strain','size1','qty1','custom1','coupon1')">
Order on WhatsApp
</button>
</div>

</div>

<script>
const pricePerOz = 376.47;
const minimumOrder = 50;

const coupons = {
"SAVE10": 0.10,
"VIP20": 0.20
};

function toggleCustomQty(selectId, inputId){
const select=document.getElementById(selectId);
const input=document.getElementById(inputId);
input.style.display=(select.value==="custom")?"block":"none";
}

function getQty(qtyId, customId){
const q=document.getElementById(qtyId).value;
const c=document.getElementById(customId).value;
return (q==="custom"&&c)?parseInt(c):parseInt(q);
}

function getDiscount(qty){
if(qty>=10) return 0.20;
if(qty>=5) return 0.10;
return 0;
}

function getCoupon(code){
return coupons[code.toUpperCase()] || 0;
}

function updateTotal(id){
const size=parseFloat(document.getElementById("size"+id).value);
const qty=getQty("qty"+id,"custom"+id);
const coupon=document.getElementById("coupon"+id).value;

const base=pricePerOz*size*qty;
const bulk=getDiscount(qty);
const couponDisc=getCoupon(coupon);

const total=base*(1-bulk)*(1-couponDisc);
const saved=base-total;

document.getElementById("total"+id).innerText="$"+total.toFixed(2);

if(saved>0){
document.getElementById("save"+id).innerText="🔥 You saved $"+saved.toFixed(2);
}else{
document.getElementById("save"+id).innerText="";
}

// Upsell logic
if(qty<5){
document.getElementById("upsell"+id).innerText=
"Add "+(5-qty)+" more for 10% off";
}else if(qty<10){
document.getElementById("upsell"+id).innerText=
"Add "+(10-qty)+" more for 20% off";
}else{
document.getElementById("upsell"+id).innerText="🔥 Max discount applied";
}
}

function getSizeLabel(size){
if(size==0.125) return "1/8 oz";
if(size==0.5) return "1/2 oz";
if(size==1) return "1 oz";
if(size==16) return "1 lb";
return size+" oz";
}

function order(product,sizeId,qtyId,customId,couponId){
const size=parseFloat(document.getElementById(sizeId).value);
const qty=getQty(qtyId,customId);
const coupon=document.getElementById(couponId).value;

const base=pricePerOz*size*qty;
const total=base*(1-getDiscount(qty))*(1-getCoupon(coupon));

if(total<minimumOrder){
alert("Minimum order is $"+minimumOrder);
return;
}

const msg="DIABLITO\n\nOrder Request\n\n"+
product+"\n"+
"Size: "+getSizeLabel(size)+"\n"+
"Quantity: "+qty+"\n"+
(coupon? "Coupon: "+coupon+"\n":"")+
"Total: $"+total.toFixed(2)+"\n"+
"Please confirm availability and total.\n\n";

window.open("https://wa.me/526635130363?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
