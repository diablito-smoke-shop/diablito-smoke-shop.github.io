<script>
function order(product, sizeId, qtyId){

const qty = document.getElementById(qtyId).value;

const message = `DIABLITO

Order Request

${product}
Size: ${size}
Quantity: ${qty}

Please confirm availability and total.

`;

const url = "https://wa.me/526635130363?text=" + encodeURIComponent(message);

window.open(url);
}
</script>
