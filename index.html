<script>
function order(product, sizeId, qtyId, customId){

let size=document.getElementById(sizeId).value;
let qty=document.getElementById(qtyId).value;

if(qty==="more"){
qty=document.getElementById(customId).value || "Not specified";
}

let message =
"🔥 DIABLITO ORDER\n\n" +
"Product: " + product + "\n" +
"Size: " + size + "\n" +
"Quantity: " + qty + "\n\n" +
"Do you deliver? 🚚";

let url = "https://wa.me/526635130363?text=" + encodeURIComponent(message);

window.open(url, "_blank");
}
</script>
