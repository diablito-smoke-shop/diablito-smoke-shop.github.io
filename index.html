<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;text-align:center}
.header{background:#000;padding:15px;border-bottom:1px solid #222}
.logo{font-size:1.8rem;color:#ff1a1a}
.hero{padding:30px}
.hero h1{text-shadow:0 0 15px red}
.trust{font-size:0.9rem;opacity:0.8;margin-bottom:10px}
.video{padding:10px}
.video video{width:90%;border-radius:10px}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
padding:15px
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(255,0,0,0.3)
}

.card img{
width:100%;
height:140px;
object-fit:cover
}

.price{color:#ff4444;font-weight:bold}

button{
background:#25D366;
color:#fff;
border:none;
padding:10px;
width:100%;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header"><div class="logo">🔥 DIABLITO</div></div>

<div class="hero">
<h1>Premium Smoke Experience</h1>
<p>Order instantly via WhatsApp</p>
<div class="trust">🚚 Same Day Delivery • 🔒 Discreet • ⭐ Trusted in Tijuana</div>
</div>

<div class="video">
<video controls>
<source src="GrowHub.mp4" type="video/mp4">
</video>
</div>

<div class="products">

<div class="card">
<img src="strain1.jpg">
<h3>Premium Strain 🔥</h3>
<div class="price">$200</div>
<button onclick="window.open('https://wa.me/5216641234567?text=Premium%20Strain')">
Order on WhatsApp
</button>
</div>

<div class="card">
<img src="strain2.jpg">
<h3>Exotic Strain 💨</h3>
<div class="price">$250</div>
<button onclick="window.open('https://wa.me/5216646041633?text=Exotic%20Strain')">
Order on WhatsApp
</button>
</div>

<div class="card">
<img src="strain3.jpg">
<h3>Top Shelf Strain 🌿</h3>
<div class="price">$280</div>
<button onclick="window.open('https://wa.me/5216641234567?text=Top%20Shelf%20Strain')">
Order on WhatsApp
</button>
</div>

<div class="card">
<img src="allstrains.jpg">
<h3>All Strains Pack</h3>
<div class="price">$600</div>
<button onclick="window.open('https://wa.me/6646041633?text=All%20Strains')">
Order on WhatsApp
</button>
</div>

</div>

</body>
</html>
