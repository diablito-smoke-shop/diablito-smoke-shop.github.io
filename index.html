<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#050505;color:#fff;text-align:center}
.header{background:#000;padding:15px;border-bottom:1px solid #222}
.logo{font-size:1.8rem;color:#ff1a1a}
.hero{padding:30px}
.hero h1{text-shadow:0 0 15px red}
.trust{font-size:0.9rem;opacity:0.8;margin-bottom:10px}
.video{padding:10px}
.video video{width:90%;border-radius:10px}
.promo{background:#ff1a1a;padding:10px;font-weight:bold;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
padding:15px
}

.card{
background:#111;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(255,0,0,0.3);
padding-bottom:10px;
}

.card img{width:100%;height:140px;object-fit:cover}

select,input{
width:90%;
margin:5px 0;
padding:6px;
}

input{display:none;}

.total{color:#25D366;font-weight:bold;margin:5px 0}

.cartBar{
position:fixed;
bottom:0;
width:100%;
background:#000;
border-top:1px solid #222;
padding:10px;
}

button{
background:#25D366;
color:#fff;
border:none;
padding:10px;
width:90%;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header"><div class="logo">🔥 DIABLITO</div></div>

<div class="hero">
<h1>Premium Smoke Experience</h1>
<p>Order instantly via WhatsApp</p>
<div class="trust">🚚 Same Day Delivery • 🔒 Discreet • ⭐ Trusted in Tijuana</div>
</div>

<div class="promo">🔥 BUY MORE = BETTER DEALS 🔥</div>

<div class="video">
<video controls>
<source src="GrowHub.mp4" type="video/mp4">
</video>
</div>

<div class="products">

<!-- PRODUCT 1 -->
<div class="card">
<img src="strain1.jpg">
<h3>Premium Strain 🔥</h3>

<select id="size1" onchange="updateItem(1)">
<option value="0.125">1/8 oz</option>
<option value="0.5">1/2 oz</option>
<option value="1">1 oz</option>
<option value="16">1 lb</option>
</select>

<select id="qty1" onchange="toggleCustomQty('qty1','custom1'); updateItem(1)">
<option value="1">Qty: 1</option>
<option value="2">Qty: 2</option>
<option value="3">Qty: 3</option>
<option value="4">Qty: 4</option>
<option value="5">Qty: 5</option>
<option value="custom">More...</option>
</select>

<input type="number" id="custom1" placeholder="Enter quantity" oninput="updateItem(1)">

<div class="total" id="item1">$0.00</div>

<button onclick="addToCart('Premium Strain','size1','qty1','custom1',1)">
Add to Cart
</button>
</div>

<!-- PRODUCT 2 -->
<div class="card">
<img src="strain2.jpg">
<h3>Exotic Strain 💨</h3>

<select id="size2" onchange="updateItem(2)">
<option value="0.125">1/8 oz</option>
<option value="0.5">1/2 oz</option>
<option value="1">1 oz</option>
<option value="16">1 lb</option>
</select>

<select id="qty2" onchange="toggleCustomQty('qty2','custom2'); updateItem(2)">
<option value="1">Qty: 1</option>
<option value="2">Qty: 2</option>
<option value="3">Qty: 3</option>
<option value="4">Qty: 4</option>
<option value="5">Qty: 5</option>
<option value="custom">More...</option>
</select>

<input type="number" id="custom2" placeholder="Enter quantity" oninput="updateItem(2)">

<div class="total" id="item2">$0.00</div>

<button onclick="addToCart('Exotic Strain','size2','qty2','custom2',2)">
Add to Cart
</button>
</div>

<!-- PRODUCT 3 -->
<div class="card">
<img src="strain3.jpg">
<h3>Top Shelf Strain 🌿</h3>

<select id="size3" onchange="updateItem(3)">
<option value="0.125">1/8 oz</option>
<option value="0.5">1/2 oz</option>
<option value="1">1 oz</option>
<option value="16">1 lb</option>
</select>

<select id="qty3" onchange="toggleCustomQty('qty3','custom3'); updateItem(3)">
<option value="1">Qty: 1</option>
<option value="2">Qty: 2</option>
<option value="3">Qty: 3</option>
<option value="4">Qty: 4</option>
<option value="5">Qty: 5</option>
<option value="custom">More...</option>
</select>

<input type="number" id="custom3" placeholder="Enter quantity" oninput="updateItem(3)">

<div class="total" id="item3">$0.00</div>

<button onclick="addToCart('Top Shelf Strain','size3','qty3','custom3',3)">
Add to Cart
</button>
</div>

<!-- PRODUCT 4 -->
<div class="card">
<img src="allstrains.jpg">
<h3>All Strains Pack</h3>

<select id="size4" onchange="updateItem(4)">
<option value="0.125">1/8 oz</option>
<option value="0.5">1/2 oz</option>
<option value="1">1 oz</option>
<option value="16">1 lb</option>
</select>

<select id="qty4" onchange="toggleCustomQty('qty4','custom4'); updateItem(4)">
<option value="1">Qty: 1</option>
<option value="2">Qty: 2</option>
<option value="3">Qty: 3</option>
<option value="4">Qty: 4</option>
<option value="5">Qty: 5</option>
<option value="custom">More...</option>
</select>

<input type="number" id="custom4" placeholder="Enter quantity" oninput="updateItem(4)">

<div class="total" id="item4">$0.00</div>

<button onclick="addToCart('All Strains Pack','size4','qty4','custom4',4)">
Add to Cart
</button>
</div>

</div>

<div class="cartBar">
<div id="grandTotal">Total: $0.00</div>
<button onclick="checkout()">Order on WhatsApp</button>
</div>

<script>
const pricePerOz = 376.47;
let cart = [];

function toggleCustomQty(selectId, inputId){
const s = document.getElementById(selectId);
const i = document.getElementById(inputId);
i.style.display = (s.value === "custom") ? "block" : "none";
}

function getDiscount(q){
if(q>=10) return 0.20;
if(q>=5) return 0.10;
return 0;
}

function getQty(qid,cid){
const q=document.getElementById(qid).value;
const c=document.getElementById(cid).value;
return (q==="custom" && c)?parseInt(c):parseInt(q);
}

function sizeLabel(s){
if(s==0.125) return "1/8 oz";
if(s==0.5) return "1/2 oz";
if(s==1) return "1 oz";
if(s==16) return "1 lb";
}

function updateItem(id){
const size=parseFloat(document.getElementById("size"+id).value);
const qty=getQty("qty"+id,"custom"+id);
const disc=getDiscount(qty);
const total=(pricePerOz*size*qty)*(1-disc);
document.getElementById("item"+id).innerText="$"+total.toFixed(2);
}

function addToCart(name,sid,qid,cid,id){
const size=parseFloat(document.getElementById(sid).value);
const qty=getQty(qid,cid);
const disc=getDiscount(qty);
const total=(pricePerOz*size*qty)*(1-disc);

cart.push({name,size:sizeLabel(size),qty,total});
updateCart();
}

function updateCart(){
let t=0;
cart.forEach(i=>t+=i.total);
document.getElementById("grandTotal").innerText="Total: $"+t.toFixed(2);
}

function checkout(){
let msg="DIABLITO\n\nOrder Request\n\n";
let t=0;

cart.forEach(i=>{
msg+=i.name+"\nSize: "+i.size+"\nQuantity: "+i.qty+"\nItem Total: $"+i.total.toFixed(2)+"\n\n";
t+=i.total;
});

msg+="Grand Total: $"+t.toFixed(2)+"\nPlease confirm availability and total.\n\n";

window.open("https://wa.me/526635130363?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
