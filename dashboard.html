<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#050505;
color:#fff;
}

/* HEADER */
.header{
background:#000;
padding:15px;
border-bottom:1px solid #222;
text-align:center;
}

.logo{
font-size:2rem;
color:#ff1a1a;
text-shadow:0 0 10px red;
}

/* GRID DASHBOARD */
.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;
}

/* CARD */
.card{
background:#111;
border-radius:15px;
padding:20px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(255,0,0,0.2);
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,0,0,0.6);
}

/* ICON */
.icon{
font-size:2rem;
margin-bottom:10px;
}

/* TITLE */
.title{
font-size:1rem;
font-weight:bold;
}

/* STATUS */
.status{
font-size:0.8rem;
opacity:0.6;
margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">🔥 DIABLITO HUB 🔥</div>
</div>

<div class="dashboard">

<!-- SMOKE SHOP -->
<div class="card" onclick="openPage('index.html')">
<div class="icon">🔥</div>
<div class="title">Smoke Shop</div>
<div class="status">LIVE</div>
</div>

<!-- MOVIES -->
<div class="card" onclick="openPage('movies.html')">
<div class="icon">🎬</div>
<div class="title">Movies</div>
<div class="status">Coming Soon</div>
</div>

<!-- MUSIC -->
<div class="card" onclick="openPage('music.html')">
<div class="icon">🎵</div>
<div class="title">Music Videos</div>
<div class="status">Coming Soon</div>
</div>

<!-- GAMES -->
<div class="card" onclick="openPage('games.html')">
<div class="icon">🎮</div>
<div class="title">Gaming Zone</div>
<div class="status">RTX 3070 Ready</div>
</div>

<!-- FOOD -->
<div class="card" onclick="openPage('food.html')">
<div class="icon">🍔</div>
<div class="title">Food Ordering</div>
<div class="status">Coming Soon</div>
</div>

<!-- AI LAB -->
<div class="card" onclick="openPage('ai.html')">
<div class="icon">🤖</div>
<div class="title">AI Lab</div>
<div class="status">Local + Online</div>
</div>

</div>

<script>
function openPage(page){
window.location.href = page;
}
</script>

</body>
</html>
